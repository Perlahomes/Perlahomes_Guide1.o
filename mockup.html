<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/><meta name="theme-color" content="#1f3a5f"/><title>Villa Aurora · Perlahomes (mockup)</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet"/><style>/* =========================================================
   Perlahomes Guest Guide — hub & spoke
   Brand theme lives in :root.
   ========================================================= */
:root {
  --bg:        #f3f3f1;
  --card:      #ffffff;
  --ink:       #18222e;
  --muted:     #687180;
  --accent:    #2f6fd0;   /* azure — icons, links, bottom bar */
  --accent-dk: #1f3a5f;   /* deep navy — headings/chrome */
  --tint:      #eaf1fb;
  --line:      rgba(24, 34, 46, 0.09);
  --shadow:    0 1px 2px rgba(24,34,46,.05), 0 10px 30px rgba(24,34,46,.07);
  --radius:    20px;
  --radius-sm: 13px;
  --maxw:      480px;
  --bar-h:     76px;
  --serif: "Playfair Display", Georgia, serif;
  --sans:  "Mulish", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }
body { font-family: var(--sans); color: var(--ink); background: var(--bg); line-height: 1.55; -webkit-font-smoothing: antialiased; }

#app { max-width: var(--maxw); margin: 0 auto; min-height: 100vh; background: var(--bg);
  padding-bottom: calc(var(--bar-h) + env(safe-area-inset-bottom)); }
.loading { padding: 42vh 24px; text-align: center; color: var(--muted); }

.error { padding: 16vh 28px; text-align: center; }
.error h1 { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 10px; }
.error code { background: var(--tint); padding: 2px 7px; border-radius: 6px; font-size: .85em; }
.expired { max-width: var(--maxw); margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; padding: 40px 28px; gap: 4px; }
.expired__logo { width: 110px; border-radius: 12px; margin-bottom: 18px; }
.expired h1 { font-family: var(--serif); font-weight: 700; font-size: 1.6rem; color: var(--ink); }
.expired p { color: var(--muted); font-size: 1rem; max-width: 320px; margin-top: 6px; }
.expired__btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 22px; }
.exp-btn { display: inline-flex; align-items: center; gap: 7px; text-decoration: none; font-weight: 700;
  font-size: .92rem; padding: 12px 18px; border-radius: 999px; color: #fff; }
.exp-btn svg { width: 17px; height: 17px; }
.exp-call { background: var(--accent-dk); } .exp-wa { background: #25d366; } .exp-vb { background: #7360f2; }
img { display: block; max-width: 100%; }

/* ---------- top bar (flag picker / back) ---------- */
.topbar {
  position: sticky; top: 0; z-index: 30;
  display: flex; align-items: center; gap: 10px;
  padding: calc(8px + env(safe-area-inset-top)) 14px 8px;
  background: rgba(243,243,241,.86); backdrop-filter: blur(10px);
}
.topbar.is-home { background: transparent; position: absolute; left: 0; right: 0; }
.topbar__title { flex: 1; text-align: center; font-family: var(--serif); font-weight: 600;
  font-size: 1.18rem; letter-spacing: .14em; color: var(--accent-dk); text-transform: uppercase; }
.iconbtn {
  width: 40px; height: 40px; flex: none; border: 0; cursor: pointer;
  background: rgba(255,255,255,.85); border-radius: 12px; box-shadow: var(--shadow);
  display: grid; place-items: center; color: var(--ink);
}
.is-home .iconbtn { background: rgba(255,255,255,.92); }
.iconbtn svg { width: 20px; height: 20px; }
.spacer { width: 40px; flex: none; }

/* language picker */
.lang { position: relative; }
.lang__btn {
  display: inline-flex; align-items: center; gap: 6px; cursor: pointer; border: 0;
  background: rgba(255,255,255,.9); border-radius: 12px; box-shadow: var(--shadow);
  padding: 7px 9px; font: inherit; color: var(--ink);
}
.lang__btn .flag { width: 26px; height: 18px; border-radius: 3px; overflow: hidden; flex: none; }
.lang__btn svg { width: 15px; height: 15px; color: var(--muted); }
.lang__menu {
  position: absolute; top: calc(100% + 6px); left: 0; z-index: 40;
  background: var(--card); border-radius: 12px; box-shadow: var(--shadow);
  padding: 5px; min-width: 132px; display: none;
}
.lang__menu.open { display: block; }
.lang__menu button {
  width: 100%; display: flex; align-items: center; gap: 9px; border: 0; cursor: pointer;
  background: none; font: inherit; color: var(--ink); padding: 9px 10px; border-radius: 8px; text-align: left;
}
.lang__menu button:hover { background: var(--tint); }
.lang__menu .flag { width: 24px; height: 16px; border-radius: 3px; overflow: hidden; flex: none; }

/* ---------- HOME: hero ---------- */
.hero { position: relative; min-height: 56vh; display: flex; flex-direction: column;
  justify-content: flex-end; padding: 20px 20px 26px; color: #fff; background: var(--accent-dk);
  background-size: cover; background-position: center; overflow: hidden; }
.hero::before { content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(12,20,30,.10) 30%, rgba(12,20,30,.62) 100%); }
.hero__logo { position: relative; z-index: 2; width: 116px; height: auto; border-radius: 12px;
  background: #fff; padding: 10px; box-shadow: var(--shadow); margin-bottom: 16px; }
.hero__welcome { position: relative; z-index: 2; font-family: var(--serif); font-weight: 700;
  font-size: clamp(2.2rem, 11vw, 3.1rem); line-height: 1.02; }

/* welcome message card */
.welcome-card { margin: -28px 16px 0; position: relative; z-index: 5;
  background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px 18px; }
.welcome-card p { color: var(--ink); font-size: 1rem; }
.welcome-card p.clamp { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
.readmore { margin-top: 12px; border: 0; background: none; cursor: pointer; font: inherit;
  font-weight: 700; color: var(--accent); display: inline-flex; align-items: center; gap: 5px; padding: 0; }
.readmore svg { width: 16px; height: 16px; transition: transform .2s; }
.readmore.open svg { transform: rotate(180deg); }

/* ---------- HOME: GUIDE grid ---------- */
.guide-label { text-align: center; font-family: var(--serif); font-weight: 600; letter-spacing: .16em;
  text-transform: uppercase; color: var(--accent-dk); font-size: 1.05rem; margin: 26px 0 4px;
  display: flex; align-items: center; gap: 14px; justify-content: center; }
.guide-label::before, .guide-label::after { content: ""; height: 1px; width: 42px; background: var(--line); }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px; }
.tile { background: var(--card); border: 0; cursor: pointer; border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 26px 14px 20px; display: flex; flex-direction: column;
  align-items: center; gap: 16px; font: inherit; color: var(--ink); min-height: 150px;
  justify-content: center; transition: transform .06s; text-decoration: none; }
.tile:active { transform: scale(.98); }
.tile svg { width: 40px; height: 40px; stroke-width: 1.5; color: var(--ink); }
.tile span { font-size: 1.02rem; font-weight: 600; text-align: center; line-height: 1.25; }

/* ---------- CATEGORY page ---------- */
.page-title { font-family: var(--serif); font-weight: 700; text-transform: uppercase;
  font-size: clamp(1.7rem, 7.5vw, 2.3rem); line-height: 1.08; color: var(--ink);
  padding: 8px 18px 4px; letter-spacing: .01em; }
.group-label { font-family: var(--serif); font-weight: 600; text-transform: uppercase;
  letter-spacing: .12em; color: var(--ink); font-size: 1.16rem; padding: 22px 18px 2px; }
.page-intro { color: var(--ink); font-size: 1rem; line-height: 1.5; padding: 2px 18px 6px; opacity: .9; }
.cards { padding: 14px 16px 4px; display: flex; flex-direction: column; gap: 18px; }
.card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.card--tap { cursor: pointer; transition: transform .06s; }
.card--tap:active { transform: scale(.992); }
.card__imgwrap { position: relative; }
.card__expand { position: absolute; top: 10px; right: 10px; width: 32px; height: 32px; border-radius: 9px;
  background: rgba(24,34,46,.55); color: #fff; display: grid; place-items: center; backdrop-filter: blur(4px); }
.card__expand svg { width: 16px; height: 16px; }
.card__multi { position: absolute; left: 10px; bottom: 10px; background: rgba(24,34,46,.78); color: #fff;
  font-size: .76rem; font-weight: 700; padding: 3px 9px; border-radius: 999px; display: inline-flex;
  align-items: center; gap: 4px; }
.card__multi::before { content: "▦"; font-size: .8em; }
.distpill { display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px;
  background: var(--tint); color: var(--accent-dk); font-size: .76rem; font-weight: 700;
  padding: 4px 10px; border-radius: 999px; }
.distpill svg { width: 13px; height: 13px; }
.checklist { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.checklist li { margin: 0; }
.chk { display: flex; align-items: flex-start; gap: 12px; width: 100%; text-align: left; background: none;
  border: 0; cursor: pointer; padding: 9px 6px; font: inherit; color: var(--ink); border-radius: 10px; }
.chk:hover { background: var(--tint); }
.chk .box { flex: none; width: 22px; height: 22px; border: 2px solid var(--accent); border-radius: 6px;
  display: grid; place-items: center; margin-top: 1px; transition: background .12s, border-color .12s; }
.chk .box::after { content: ""; width: 11px; height: 6px; border-left: 2.5px solid #fff; border-bottom: 2.5px solid #fff;
  transform: rotate(-45deg) translateY(-1px); opacity: 0; transition: opacity .12s; }
.chk.done .box { background: var(--accent); border-color: var(--accent); }
.chk.done .box::after { opacity: 1; }
.chk__t { font-size: 1rem; line-height: 1.4; font-weight: 500; }
.chk.done .chk__t { text-decoration: line-through; color: var(--muted); }
.card__img { width: 100%; aspect-ratio: 16 / 10; object-fit: cover; background: var(--tint); }
.card__pad { padding: 16px 18px 19px; }
.card__title { font-weight: 700; font-size: 1.16rem; color: var(--ink); margin-bottom: 7px; }
.card__body { color: var(--ink); font-size: .98rem; }
.card__body--clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* ---------- swipeable detail ---------- */
.detail { position: fixed; top: 0; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: var(--maxw); z-index: 50; background: var(--bg);
  display: flex; flex-direction: column; }
.detail__bar { display: flex; align-items: center; gap: 10px;
  padding: calc(8px + env(safe-area-inset-top)) 14px 8px; }
.detail__count { flex: 1; text-align: center; font-weight: 700; color: var(--muted); font-size: .92rem;
  font-variant-numeric: tabular-nums; }
.swiper { flex: 1; display: flex; overflow-x: auto; overflow-y: hidden;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.swiper::-webkit-scrollbar { display: none; }
.slide { flex: 0 0 86%; scroll-snap-align: center; overflow-y: auto; padding: 4px 7px calc(20px + env(safe-area-inset-bottom)); }
.slide__card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.slide__img { width: 100%; aspect-ratio: 4 / 3; object-fit: cover; background: var(--tint); }
.slide__pad { padding: 18px 18px 22px; }
.slide__title { font-family: var(--serif); font-weight: 700; font-size: 1.5rem; color: var(--ink); margin-bottom: 10px; }
.slide__body { color: var(--ink); font-size: 1.02rem; }
.navarrow { position: absolute; top: 46%; transform: translateY(-50%); z-index: 2;
  width: 42px; height: 42px; border: 0; cursor: pointer; border-radius: 50%;
  background: var(--card); box-shadow: var(--shadow); color: var(--ink); display: grid; place-items: center; }
.navarrow svg { width: 20px; height: 20px; }
.navarrow--l { left: 8px; } .navarrow--r { right: 8px; }
@media (hover: none) { .navarrow { display: none; } }  /* touch devices swipe instead */

/* position indicator: dots for few cards, a progress bar for many */
.dots { display: flex; gap: 7px; justify-content: center; flex-wrap: wrap;
  padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); }
.dot { width: 7px; height: 7px; border-radius: 50%; border: 0; padding: 0; cursor: pointer;
  background: #cdd3da; transition: width .2s, background .2s; }
.dot.active { background: var(--accent); width: 20px; border-radius: 4px; }
.swbar { height: 4px; margin: 14px 18px calc(16px + env(safe-area-inset-bottom));
  background: #e3e6ea; border-radius: 2px; overflow: hidden; }
.swbar__fill { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 2px; transition: width .12s linear; }

/* one-time swipe hint */
.swipehint { position: absolute; left: 50%; bottom: 70px; transform: translateX(-50%); z-index: 3;
  background: rgba(24,34,46,.86); color: #fff; font-weight: 600; font-size: .85rem;
  padding: 9px 15px; border-radius: 999px; display: flex; align-items: center; gap: 8px;
  pointer-events: none; opacity: 1; transition: opacity .45s; }
.swipehint.hide { opacity: 0; }
.swipehint svg { width: 18px; height: 18px; animation: swipenudge 1.3s ease-in-out infinite; }
@keyframes swipenudge { 0%,100% { transform: translateX(-3px); } 50% { transform: translateX(3px); } }
@media (prefers-reduced-motion: reduce) { .swipehint svg { animation: none; } }

/* code chip */
.codebox { margin-top: 14px; display: inline-flex; align-items: center; gap: 12px; cursor: pointer;
  background: var(--tint); border: 0; border-radius: var(--radius-sm); padding: 11px 13px; font: inherit; color: inherit; }
.codebox__l { font-size: .74rem; color: var(--accent-dk); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; display: block; }
.codebox__v { font-size: 1.4rem; font-weight: 800; letter-spacing: .05em; color: var(--accent-dk); font-variant-numeric: tabular-nums; }
.codebox__c { margin-left: 4px; display: inline-flex; color: var(--accent); }
.codebox__c svg { width: 18px; height: 18px; }

/* wifi pair */
.wifirow { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
.wifirow .codebox { width: 100%; justify-content: space-between; gap: 8px; margin: 0; }
.wifirow .codebox__v { font-size: 1.04rem; word-break: break-all; }
@media (max-width: 360px) { .wifirow { grid-template-columns: 1fr; } }

/* map button */
.mapbtn { display: inline-flex; align-items: center; gap: 8px; margin-top: 14px; text-decoration: none;
  background: #fff; color: var(--ink); font-weight: 700; font-size: .9rem; padding: 10px 15px 10px 12px;
  border-radius: 999px; border: 1px solid var(--line); box-shadow: 0 2px 8px rgba(24,34,46,.10);
  transition: transform .06s, box-shadow .15s; }
.mapbtn:hover { box-shadow: 0 4px 14px rgba(24,34,46,.16); }
.mapbtn:active { transform: scale(.98); }
.mapbtn svg { width: 18px; height: 18px; color: #ea4335; flex: none; }

/* ---------- bottom bar ---------- */
.bar { position: fixed; left: 0; right: 0; bottom: 0; z-index: 25; background: var(--card);
  border-top: 1px solid var(--line); display: flex; justify-content: center;
  padding-bottom: env(safe-area-inset-bottom); }
.bar__inner { display: flex; width: 100%; max-width: var(--maxw); }
.bar a { flex: 1; text-decoration: none; display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 12px 8px; color: var(--accent); font-weight: 600; font-size: .82rem; text-align: center; }
.bar a svg { width: 24px; height: 24px; stroke-width: 1.6; }

/* ---------- floating WhatsApp ---------- */
/* ---------- floating contact buttons (Viber + WhatsApp) ---------- */
.fabs { position: fixed; right: 16px; bottom: calc(var(--bar-h) + 14px + env(safe-area-inset-bottom));
  z-index: 26; display: flex; flex-direction: column; gap: 10px; align-items: center; }
.fab { width: 56px; height: 56px; border-radius: 50%; display: grid; place-items: center;
  text-decoration: none; box-shadow: 0 6px 18px rgba(0,0,0,.22); }
.fab svg { width: 30px; height: 30px; color: #fff; }
.fab--wa { background: #25d366; }
.fab--viber { background: #7360f2; }
.fab__x { position: absolute; top: -8px; right: -8px; width: 22px; height: 22px; border-radius: 50%;
  background: #fff; box-shadow: 0 1px 4px rgba(0,0,0,.2); border: 0; cursor: pointer; color: var(--muted);
  display: grid; place-items: center; font-size: 12px; line-height: 1; z-index: 2; }
.fabs.hidden { display: none; }

/* ---------- a11y / motion ---------- */
:focus-visible { outline: 3px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
@media (prefers-reduced-motion: reduce) { * { transition: none !important; } }

/* ---------- toast ---------- */
.toast { position: fixed; left: 50%; bottom: calc(var(--bar-h) + 26px + env(safe-area-inset-bottom));
  z-index: 40; background: var(--ink); color: #fff; font-weight: 600; font-size: .88rem;
  padding: 11px 18px; border-radius: 999px; box-shadow: var(--shadow);
  opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; transform: translateX(-50%) translateY(12px); }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

};</script><script>/* =========================================================

  /* ---- shared chrome ---- */

    return `<div class="lang">

        <span class="flag">${FLAGS[LANG]||""}</span>${I.chev}

        ${langs.map(l=>`<button data-setlang="${l}" role="menuitem"><span class="flag">${FLAGS[l]||""}</span>${esc(LANGNAME[l]||l.toUpperCase())}</button>`).join("")}
      </div>
    </div>`;
  }
  function bottomBar(){
    const acts = DATA.actions || [];

    return `<nav class="bar"><div class="bar__inner">${acts.map(a=>

  }
  function waButton(){
    const c = DATA.contact || {};

    if (c.whatsapp) items += `<a class="fab fab--wa" href="https://wa.me/${digits(c.whatsapp)}" target="_blank" rel="noopener" aria-label="WhatsApp">${I.wa}</a>`;
    return `<div class="fabs"><button class="fab__x" id="waX" aria-label="Hide">✕</button>${items}</div>`;
  }

  /* ---- views ---- */
  function homeView(){
    const m = DATA.meta || {};
    const heroStyle = m.heroImage ? ` style="background-image:url('${esc(m.heroImage)}')"` : "";
    const sections = DATA.sections || [];
    return `
      <div class="topbar is-home">${langPicker()||'<span class="spacer"></span>'}<span style="flex:1"></span></div>

        ${m.brandLogo ? `<img class="hero__logo" src="${esc(m.brandLogo)}" alt="">` : ""}

  function imgs(c){
    if (Array.isArray(c.images)) return c.images.filter(Boolean);
    return [c.image, c.image2].filter(Boolean);

    if (!Array.isArray(c.checklist) || !c.checklist.length) return "";

    ).join("") + `</ul>`;
  }
  function chipsHTML(c){
    if (c.wifi){
      return `<div class="wifirow">

    }
    return "";

  function cardHTML(c, idx){

    const open = (idx==null) ? "" : ` data-open="${idx}" role="button" tabindex="0"`;
    return `<article class="card${idx==null?"":" card--tap"}"${open}>
      ${list[0] ? `<div class="card__imgwrap"><img class="card__img" src="${esc(list[0])}" alt="" loading="lazy">${idx==null?"":`<span class="card__expand">${I.expand}</span>`}${list.length>1?`<span class="card__multi">+${list.length-1}</span>`:""}</div>` : ""}

        ${chipsHTML(c)}
        ${mapb}
      </div>

  }

  // flatten a section's cards (across groups) so the carousel can page through all of them
  function flatCards(sec){
    if (sec.groups && sec.groups.length) return sec.groups.reduce((a,g)=>a.concat(g.cards||[]),[]);
    return sec.cards || [];

    const list = imgs(c);

          ${c.distance ? `<span class="distpill">${I.pin}${esc(t(c.distance))}</span>` : ""}
          ${c.title ? `<h2 class="slide__title">${esc(t(c.title))}</h2>` : ""}
          ${c.body ? `<p class="slide__body">${esc(t(c.body))}</p>` : ""}
          ${checklistHTML(c)}${chipsHTML(c)}${mapb}
        </div>
      </div>
    </div>`;
  }

  function detailView(sec, idx){
    const cards = flatCards(sec);
    idx = Math.max(0, Math.min(idx, cards.length - 1));
    const indicator = cards.length <= 10
      ? `<div class="dots" id="dots">${cards.map((_,i)=>`<button class="dot${i===idx?" active":""}" data-dot="${i}" aria-label="Card ${i+1}"></button>`).join("")}</div>`

          ${cards.map(detailCardHTML).join("")}

        ${indicator}
        <button class="navarrow navarrow--l" id="dprev" aria-label="Previous">${I.back}</button>
        <button class="navarrow navarrow--r" id="dnext" aria-label="Next">${I.right}</button>
      </div>`;
  }

  function categoryView(sec){
    const intro = sec.intro ? `<p class="page-intro">${esc(t(sec.intro))}</p>` : "";
    let body;
    if (sec.groups && sec.groups.length){
      let n = 0;
      body = `<h1 class="page-title">${esc(t(sec.title))}</h1>${intro}` + sec.groups.map(g=>
        `<div class="group-label">${esc(t(g.label))}</div>
         <div class="cards">${(g.cards||[]).map(c=>cardHTML(c, n++)).join("")}</div>`).join("");
    } else {
      body = `<h1 class="page-title">${esc(t(sec.title))}</h1>${intro}
        <div class="cards">${(sec.cards||[]).map((c,i)=>cardHTML(c, i)).join("")}</div>`;
    }
    return `
      <div class="topbar"><button class="iconbtn" id="back" aria-label="Back">${I.back}</button>
        <span style="flex:1"></span>
        ${langPicker()||'<span class="spacer"></span>'}</div>
      ${body}
      ${bottomBar()}${waButton()}`;
  }

  /* ---- routing ---- */
  function parseHash(){
    const raw = location.hash.replace(/^#/, "");
    if (!raw) return { id: null, idx: null };
    const parts = raw.split("/");
    return { id: parts[0], idx: parts[1] != null ? parseInt(parts[1], 10) : null };
  }
  function sectionById(id){ return (DATA.sections||[]).find(s => s.id === id); }

  function expiredView(){
    const m = (DATA && DATA.meta) || {}, c = (DATA && DATA.contact) || {};
    const phone = c.phone ? `<a class="exp-btn exp-call" href="tel:${esc(c.phone)}">${I.phone}${LANG==="el"?"Κλήση":"Call"}</a>` : "";
    const wa = c.whatsapp ? `<a class="exp-btn exp-wa" href="https://wa.me/${digits(c.whatsapp)}" target="_blank" rel="noopener">${I.wa}WhatsApp</a>` : "";
    const vb = c.viber ? `<a class="exp-btn exp-vb" href="viber://chat?number=${encodeURIComponent("+"+digits(c.viber))}">${I.viber}Viber</a>` : "";
    return `<div class="expired">
      ${m.brandLogo ? `<img class="expired__logo" src="${esc(m.brandLogo)}" alt="">` : ""}
      <h1>${LANG==="el" ? "Ο οδηγός δεν είναι πλέον ενεργός" : "This guide is no longer active"}</h1>
      <p>${LANG==="el" ? "Η διαμονή σας έχει ολοκληρωθεί. Αν χρειάζεστε οτιδήποτε, επικοινωνήστε μαζί μας." : "Your stay has ended. If you need anything, please get in touch."}</p>
      ${(phone||wa||vb) ? `<div class="expired__btns">${phone}${wa}${vb}</div>` : ""}
    </div>`;
  }

  function render(){
    if (EXPIRED){ app.innerHTML = expiredView(); window.scrollTo(0,0); return; }
    const { id, idx } = parseHash();
    const sec = id ? sectionById(id) : null;
    if (sec && idx != null && !Number.isNaN(idx)) app.innerHTML = detailView(sec, idx);
    else if (sec) app.innerHTML = categoryView(sec);
    else app.innerHTML = homeView();
    window.scrollTo(0, 0);
    wire();
  }
  function wire(){
    app.querySelectorAll("[data-go]").forEach(b=>b.addEventListener("click",()=>{
      const s = DATA.sections[+b.dataset.go]; if (s){ location.hash = s.id; }
    }));
    const back = app.querySelector("#back"); if (back) back.addEventListener("click",()=>{ location.hash = ""; });

    // open a card -> swipeable detail at that index
    app.querySelectorAll(".chk").forEach(b=>{
      b.addEventListener("click",(e)=>{ e.stopPropagation(); b.classList.toggle("done"); });
    });
    app.querySelectorAll("[data-open]").forEach(el=>{
      const go = (e)=>{
        if (e.target.closest("a,button")) return;   // let inner links/buttons work
        const id = parseHash().id;
        location.hash = `${id}/${el.dataset.open}`;
      };
      el.addEventListener("click", go);
      el.addEventListener("keydown", e=>{ if (e.key==="Enter"||e.key===" "){ e.preventDefault(); go(e); } });
    });

    // detail view: back, arrows, dots/progress, swipe hint
    const detail = app.querySelector("#detail");
    if (detail){
      const swiper = app.querySelector("#swiper");
      const slides = Array.from(swiper.querySelectorAll(".slide"));
      const cur = app.querySelector("#dcur");
      const dotsWrap = app.querySelector("#dots");
      const fill = app.querySelector("#swfill");
      const startIdx = Math.max(0, Math.min(parseHash().idx||0, slides.length-1));
      const centerOf = (i)=> slides[i].offsetLeft + slides[i].offsetWidth/2 - swiper.clientWidth/2;
      const goTo = (i)=>{ i=Math.max(0,Math.min(i,slides.length-1)); swiper.scrollTo({ left: centerOf(i), behavior:"smooth" }); };
      const indexNow = ()=>{ const c = swiper.scrollLeft + swiper.clientWidth/2; let best=0,bd=Infinity;
        slides.forEach((s,i)=>{ const d=Math.abs((s.offsetLeft+s.offsetWidth/2)-c); if(d<bd){bd=d;best=i;} }); return best; };
      requestAnimationFrame(()=>{ swiper.scrollLeft = centerOf(startIdx); });

      app.querySelector("#dback").addEventListener("click",()=>{ location.hash = detail.dataset.section; });
      app.querySelector("#dprev").addEventListener("click",()=>goTo(indexNow()-1));
      app.querySelector("#dnext").addEventListener("click",()=>goTo(indexNow()+1));
      if (dotsWrap) dotsWrap.querySelectorAll("[data-dot]").forEach(d=>d.addEventListener("click",()=>goTo(+d.dataset.dot)));

      let raf;
      swiper.addEventListener("scroll",()=>{ cancelAnimationFrame(raf); raf = requestAnimationFrame(()=>{
        const i = indexNow();
        if (cur) cur.textContent = i+1;
        if (dotsWrap) dotsWrap.querySelectorAll(".dot").forEach((d,j)=>d.classList.toggle("active", j===i));
        if (fill){ const max = swiper.scrollWidth - swiper.clientWidth; fill.style.width = (max>0 ? (swiper.scrollLeft/max*100) : 100) + "%"; }
      }); });

      // one-time "swipe" hint with a gentle nudge (only if there's more than one card)
      const hint = app.querySelector("#swipehint");
      let seen = false; try{ seen = !!localStorage.getItem("perla_swipehint"); }catch{}
      if (hint && slides.length > 1 && !seen){
        hint.classList.remove("hide");
        const reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        if (!reduce){
          setTimeout(()=>swiper.scrollBy({ left: 64, behavior:"smooth" }), 450);
          setTimeout(()=>swiper.scrollBy({ left: -64, behavior:"smooth" }), 950);
        }
        setTimeout(()=>hint.classList.add("hide"), 2800);
        try{ localStorage.setItem("perla_swipehint","1"); }catch{}
      }
    }

    app.querySelectorAll(".codebox[data-copy]").forEach(b=>b.addEventListener("click",()=>copy(b.dataset.copy,b.dataset.what)));

    const rm = app.querySelector("#readmore"), msg = app.querySelector("#welcomeMsg");
    if (rm && msg) rm.addEventListener("click",()=>{ msg.classList.toggle("clamp"); rm.classList.toggle("open");
      rm.firstChild.textContent = (msg.classList.contains("clamp") ? (LANG==="el"?"Περισσότερα ":"Read more ") : (LANG==="el"?"Λιγότερα ":"Show less ")); });

    const lb = app.querySelector("#langBtn"), lm = app.querySelector("#langMenu");
    if (lb && lm){
      lb.addEventListener("click",e=>{ e.stopPropagation(); lm.classList.toggle("open"); lb.setAttribute("aria-expanded", lm.classList.contains("open")); });
      document.addEventListener("click",()=>lm.classList.remove("open"), { once:true });
      lm.querySelectorAll("[data-setlang]").forEach(b=>b.addEventListener("click",()=>{
        LANG = b.dataset.setlang; try{ localStorage.setItem("perla_lang",LANG); }catch{} render();
      }));
    }
    const wx = app.querySelector("#waX");
    if (wx) wx.addEventListener("click",(e)=>{ e.preventDefault(); e.stopPropagation(); waHidden = true; render(); });
  }

  function renderError(){
    app.innerHTML = `<div class="error"><h1>Guide not found</h1>
      <p>We couldn’t load <code>data/${esc(slug)}.json</code>.</p></div>`;
  }

  try{ LANG = localStorage.getItem("perla_lang") || "en"; }catch{}
  window.addEventListener("hashchange", render);

  // Standalone mode: if data is embedded (e.g. mockup.html), use it and skip fetch.
  if (window.__PERLA_DATA){
    DATA = window.__PERLA_DATA;
    const langs = (DATA.meta && DATA.meta.languages) || ["en"];
    if (!langs.includes(LANG)) LANG = langs[0];
    document.title = `${DATA.meta ? DATA.meta.name : "Guide"} · Perlahomes`;
    render();
    return;
  }

  fetch(`data/${slug}.json`, { cache:"no-cache" })
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(d=>{ DATA = d;
      const langs = (d.meta && d.meta.languages) || ["en"];
      if (!langs.includes(LANG)) LANG = langs[0];
      document.title = `${d.meta ? d.meta.name : "Guide"} · Perlahomes`;
      render();
    })
    .catch(renderError);
})();
</script></body></html>
